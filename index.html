<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SIRIUS GAMES | By:HIM1K</title>
    <!-- Подключаем красивые шрифты и иконки -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Базовый темный фон без анимации (спокойный режим) */
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03060c);
            min-height: 100vh;
            color: #ffffff;
            line-height: 1.4;
            padding: 2rem 1.5rem;
            transition: background 0.5s ease, backdrop-filter 0.3s ease;
            position: relative;
            overflow-x: hidden;
        }

        /* Класс, который добавляется по клику — включает переливающийся фон как на iPhone */
        body.glass-fluid {
            background: linear-gradient(125deg, #0f172a, #1e1b4b, #0b1120, #2d1b4e, #0f172a);
            background-size: 400% 400%;
            animation: auroraFlow 16s ease infinite;
        }

        /* Псевдоэлементы для переливающихся бликов — появляются только когда активен класс glass-fluid */
        body.glass-fluid::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 40% 50%, rgba(255,255,245,0.2) 0%, rgba(255,180,240,0.08) 40%, rgba(100,200,255,0) 70%);
            filter: blur(60px);
            opacity: 0.6;
            pointer-events: none;
            z-index: 0;
            animation: shimmerShift 12s infinite alternate;
        }

        body.glass-fluid::after {
            content: '';
            position: fixed;
            top: -30%;
            left: -30%;
            width: 160%;
            height: 160%;
            background: repeating-linear-gradient(45deg, 
                rgba(255,255,255,0.02) 0px, 
                rgba(255,255,255,0.02) 2px,
                rgba(180,220,255,0.05) 2px,
                rgba(180,220,255,0.05) 8px);
            pointer-events: none;
            transform: rotate(10deg);
            animation: glassPan 18s linear infinite;
            z-index: 0;
        }

        /* Анимации для фона */
        @keyframes auroraFlow {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        @keyframes shimmerShift {
            0% {
                transform: translate(-10%, -20%) scale(1);
                opacity: 0.4;
            }
            100% {
                transform: translate(15%, 10%) scale(1.2);
                opacity: 0.8;
            }
        }

        @keyframes glassPan {
            0% {
                transform: translateX(-5%) translateY(-5%) rotate(10deg);
            }
            100% {
                transform: translateX(5%) translateY(5%) rotate(12deg);
            }
        }

        /* Стеклянная магия — общий фон с размытием и градиентами (для всех блоков) */
        .glass {
            background: rgba(20, 30, 45, 0.35);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        /* Стеклянные карточки с едва уловимым свечением */
        .game-card {
            background: rgba(18, 25, 40, 0.4);
            backdrop-filter: blur(12px);
            border-radius: 1.8rem;
            border: 1px solid rgba(255, 255, 255, 0.25);
            transition: all 0.3s ease;
            overflow: hidden;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .game-card:hover {
            transform: translateY(-8px);
            border-color: rgba(255, 255, 255, 0.5);
            background: rgba(30, 45, 65, 0.5);
            box-shadow: 0 20px 35px -8px rgba(0, 0, 0, 0.5), 0 0 15px rgba(120, 180, 255, 0.2);
        }

        /* Стили для шапки */
        .hero {
            text-align: center;
            margin-bottom: 3rem;
            padding: 2rem 1.5rem;
            position: relative;
        }

        .hero h1 {
            font-size: 3.7rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF, #B0E0FF, #7EB8FF);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
            text-shadow: 0 2px 10px rgba(80, 150, 255, 0.3);
        }

        .hero p {
            font-size: 1.2rem;
            opacity: 0.85;
            max-width: 600px;
            margin: 1rem auto 0;
        }

        /* Кнопка Discord в окне SIRIUS GAME */
        .hero-discord-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(88, 101, 242, 0.25);
            backdrop-filter: blur(8px);
            border: 1.5px solid rgba(88, 101, 242, 0.5);
            padding: 0.7rem 1.8rem;
            border-radius: 2.5rem;
            color: white;
            font-weight: 600;
            font-size: 1.05rem;
            text-decoration: none;
            transition: all 0.3s ease;
            margin-top: 1.5rem;
            box-shadow: 0 0 20px rgba(88, 101, 242, 0.15);
        }

        .hero-discord-btn:hover {
            background: rgba(88, 101, 242, 0.5);
            border-color: rgba(88, 101, 242, 0.9);
            transform: scale(1.05);
            box-shadow: 0 0 35px rgba(88, 101, 242, 0.3);
        }

        .hero-discord-btn i {
            font-size: 1.4rem;
        }

        /* ===== КНОПКА ПЕРЕЛИВАНИЯ СВЕРХУ СПРАВА (ТОЛЬКО ОНА) ===== */
        .top-right-controls {
            position: fixed;
            top: 1.2rem;
            right: 1.5rem;
            z-index: 1000;
            display: flex;
            gap: 0.6rem;
            align-items: center;
        }

        .glass-toggle-btn {
            background: rgba(30, 45, 70, 0.5);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            padding: 0.4rem 0.9rem;
            border-radius: 1.5rem;
            cursor: pointer;
            font-weight: 400;
            transition: 0.2s;
            color: white;
            font-size: 0.7rem;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            letter-spacing: 0.3px;
            white-space: nowrap;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .glass-toggle-btn i {
            font-size: 0.7rem;
            margin-right: 2px;
        }

        .glass-toggle-btn:hover {
            background: rgba(70, 130, 200, 0.5);
            border-color: rgba(255, 255, 255, 0.6);
            transform: scale(1.05);
            box-shadow: 0 4px 20px rgba(70, 130, 200, 0.3);
        }

        /* сетка игр */
        .games-grid {
            max-width: 1300px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }

        /* Контент внутри карточек */
        .card-inner {
            padding: 1.6rem;
        }

        .game-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: #b8dcff;
        }

        .game-title {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            letter-spacing: -0.3px;
        }

        .game-desc {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 1.2rem;
            line-height: 1.4;
        }

        .game-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1rem;
            border-top: 1px solid rgba(255,255,255,0.2);
            padding-top: 1rem;
        }

        .badge {
            background: rgba(255,255,255,0.15);
            padding: 0.25rem 0.8rem;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 500;
            backdrop-filter: blur(4px);
        }

        /* ЕДИНСТВЕННАЯ КНОПКА - СКАЧАТЬ / ИГРАТЬ */
        .play-link {
            color: white;
            text-decoration: none;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
            background: rgba(255,255,255,0.1);
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            font-size: 0.85rem;
        }

        .play-link:hover {
            background: rgba(80, 160, 255, 0.35);
            gap: 12px;
        }

        /* пустое состояние (пример для будущих игр) */
        .empty-message {
            text-align: center;
            padding: 3rem;
            background: rgba(255,255,255,0.05);
            border-radius: 2rem;
            backdrop-filter: blur(5px);
        }

        /* футер */
        footer {
            text-align: center;
            margin-top: 4rem;
            padding: 1.8rem;
            font-size: 0.85rem;
            opacity: 0.7;
        }

        /* адаптив */
        @media (max-width: 680px) {
            body {
                padding: 1rem;
                padding-top: 4.5rem;
            }
            .hero h1 {
                font-size: 2.2rem;
            }
            .games-grid {
                gap: 1.2rem;
            }
            .hero-discord-btn {
                font-size: 0.9rem;
                padding: 0.6rem 1.4rem;
            }
            .top-right-controls {
                top: 0.8rem;
                right: 0.8rem;
            }
            .glass-toggle-btn {
                font-size: 0.6rem;
                padding: 0.3rem 0.6rem;
            }
        }
    </style>
</head>
<body>

<!-- ===== ТОЛЬКО КНОПКА ПЕРЕЛИВАНИЯ СВЕРХУ СПРАВА ===== -->
<div class="top-right-controls">
    <button id="toggleThemeBtn" class="glass-toggle-btn">
        <i class="fas fa-glass-cheers"></i> Перелив
    </button>
</div>

<div class="hero glass" style="border-radius: 2rem; padding: 2rem;">
    <h1><i class="fas fa-dice-d6"></i> SIRIUS GAME</h1>
    <p>Коллекция игр и уникальные проекты.</p>
    <div style="margin-top: 1rem; opacity: 0.7; font-size: 0.85rem;">
        <i class="fas fa-gamepad"></i> игры для ПК
    </div>
    <!-- Кнопка Discord в окне -->
    <a href="https://discord.gg/k2wZMC8a" target="_blank" rel="noopener noreferrer" class="hero-discord-btn">
        <i class="fab fa-discord"></i> Присоединяйся к Discord
    </a>
</div>

<div class="games-grid" id="gamesContainer">
    <!-- Карточки будут загружены через JS -->
</div>

<footer class="glass" style="max-width: 1300px; margin-left: auto; margin-right: auto;">
    <i class="far fa-gem"></i> SIRIUS STUDIO · Игры от SIRIUS 2026 · <i class="fas fa-code"></i> by H1MIK
</footer>

<script>
    // ======================= НАСТРОЙКА ССЫЛКИ ДЛЯ СКАЧИВАНИЯ =======================
    const DOWNLOAD_URL = "https://disk.yandex.ru/d/Z_H_4aqr7uSPsQ";
    // ============================================================================

    // БАЗА ИГР
    let games = [
        {
            id: 1,
            title: "Bloody Night",
            description: "Главный герой проводит обычный вечер дома, но решает выйти в магазин. Пока он идет по темной улице, кто-то неожиданно наносит ему удар по голове. Очнувшись, он понимает, что находится в клетке в неизвестном доме. Теперь ему предстоит выбраться, понять, кто его похитил, и выжить.",
            icon: "fa-solid fa-cube",
            badge: "Close Beta",
            link: DOWNLOAD_URL,
            external: true
        },
        
    ];

    // Функция рендеринга карточек игр
    function renderGames() {
        const container = document.getElementById('gamesContainer');
        if (!container) return;

        if (games.length === 0) {
            container.innerHTML = `<div class="empty-message glass" style="grid-column: 1/-1;">
                                        <i class="fas fa-download" style="font-size: 3rem; opacity: 0.7;"></i>
                                        <h3 style="margin-top: 1rem;">Игры будут доступны для скачивания</h3>
                                        <p>Ссылка для скачивания настраивается в переменной DOWNLOAD_URL</p>
                                    </div>`;
            return;
        }

        let html = '';
        for (let game of games) {
            const displayTitle = game.title && game.title.trim() !== "" ? game.title : "Без названия";
            const displayDesc = game.description && game.description.trim() !== "" ? game.description : "Нажмите скачать, чтобы получить игру.";
            const targetAttr = game.external ? '_blank' : '_self';
            html += `
                <div class="game-card">
                    <div class="card-inner">
                        <div class="game-icon">
                            <i class="${game.icon}"></i>
                        </div>
                        <div class="game-title">${escapeHtml(displayTitle)}</div>
                        <div class="game-desc">${escapeHtml(displayDesc)}</div>
                        <div class="game-meta">
                            <span class="badge"><i class="fa-regular fa-circle-down"></i> ${escapeHtml(game.badge)}</span>
                            <a href="${game.link}" class="play-link" target="${targetAttr}" rel="noopener noreferrer">
                                <span>Скачать</span> <i class="fas fa-download"></i>
                            </a>
                        </div>
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;
    }

    // простая защита от XSS
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // --- Логика переключения темы (вкл/выкл переливания) ---
    function toggleFluidTheme() {
        const body = document.body;
        const toggleBtn = document.getElementById('toggleThemeBtn');
        
        if (body.classList.contains('glass-fluid')) {
            body.classList.remove('glass-fluid');
            if (toggleBtn) {
                toggleBtn.innerHTML = '<i class="fas fa-glass-cheers"></i> Перелив';
                toggleBtn.style.background = "rgba(30, 45, 70, 0.5)";
            }
        } else {
            body.classList.add('glass-fluid');
            if (toggleBtn) {
                toggleBtn.innerHTML = '<i class="fas fa-water"></i> Выкл';
                toggleBtn.style.background = "rgba(80, 60, 120, 0.5)";
            }
        }
    }

    // Привязываем обработчик к кнопке переливания
    const themeBtn = document.getElementById('toggleThemeBtn');
    if (themeBtn) {
        themeBtn.addEventListener('click', toggleFluidTheme);
    }

    // Инициализируем отображение игр
    renderGames();

    console.log("🎮 SIRIUS GAMES загружены!");
    console.log("💬 Discord сервер: https://discord.gg/k2wZMC8a");
    console.log("📥 Ссылка для скачивания:", DOWNLOAD_URL);
</script>

</body>
</html>
