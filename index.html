<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>SIRIUS GAMES — Bloody Night | Официальный сайт</title>
  <!-- Google Fonts и Font Awesome -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0c12;
      font-family: 'Inter', 'Orbitron', sans-serif;
      color: #fff;
      overflow-x: hidden;
      line-height: 1.5;
    }

    /* Звёздный фон */
    .stars-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at 20% 30%, #0f121f, #03050b);
      z-index: -2;
    }

    .stars-bg::before {
      content: '';
      position: absolute;
      width: 200%;
      height: 200%;
      background-image: 
        radial-gradient(2px 2px at 15px 60px, #fff, rgba(0,0,0,0)),
        radial-gradient(1px 1px at 85px 140px, #f8f9ff, rgba(0,0,0,0)),
        radial-gradient(3px 2px at 250px 310px, #f0f0ff, rgba(0,0,0,0)),
        radial-gradient(1px 1px at 500px 70px, #ffe6f0, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 670px 400px, #c0e0ff, rgba(0,0,0,0)),
        radial-gradient(1px 1px at 890px 20px, #ffffff, rgba(0,0,0,0)),
        radial-gradient(2px 1px at 1020px 510px, #b0c4ff, rgba(0,0,0,0)),
        radial-gradient(1px 2px at 1200px 200px, #ddd, rgba(0,0,0,0));
      background-repeat: no-repeat;
      opacity: 0.5;
      animation: twinkle 8s infinite alternate;
    }

    @keyframes twinkle {
      0% { opacity: 0.3; }
      100% { opacity: 0.9; }
    }

    /* Свечение и туман */
    .glow {
      position: fixed;
      width: 80vw;
      height: 80vw;
      background: radial-gradient(circle, rgba(80, 40, 140, 0.3), transparent 70%);
      top: -20vh;
      right: -20vw;
      border-radius: 50%;
      filter: blur(80px);
      z-index: -1;
      animation: floatGlow 18s infinite alternate;
    }

    .glow2 {
      left: -30vw;
      bottom: -20vh;
      top: auto;
      background: radial-gradient(circle, rgba(20, 100, 180, 0.25), transparent 70%);
      animation: floatGlow2 22s infinite alternate;
    }

    @keyframes floatGlow {
      0% { transform: translate(0, 0) scale(1); opacity: 0.4; }
      100% { transform: translate(6%, -8%) scale(1.2); opacity: 0.8; }
    }
    @keyframes floatGlow2 {
      0% { transform: translate(0, 0) scale(1); opacity: 0.3; }
      100% { transform: translate(-5%, 6%) scale(1.3); opacity: 0.7; }
    }

    /* Основной контейнер */
    .container {
      max-width: 1300px;
      margin: 0 auto;
      padding: 2rem 2rem 4rem;
      position: relative;
      z-index: 2;
    }

    /* Шапка */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      padding: 1rem 0 2rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      margin-bottom: 3rem;
    }

    .logo {
      font-family: 'Orbitron', monospace;
      font-weight: 800;
      font-size: 2rem;
      letter-spacing: 3px;
      background: linear-gradient(135deg, #FFFFFF, #b190ff, #5f7eff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 12px rgba(95, 126, 255, 0.4);
    }

    .logo span {
      font-size: 1.9rem;
      background: none;
      -webkit-background-clip: unset;
      background-clip: unset;
      color: #ffffffd9;
    }

    .menu-icons a {
      color: #ccc;
      margin-left: 28px;
      font-size: 1.4rem;
      transition: 0.2s;
    }

    .menu-icons a:hover {
      color: #a981ff;
      transform: translateY(-2px);
    }

    /* Hero секция — только заголовок SIRIUS GAMES, без лишнего текста */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin: 2rem 0 2rem;
    }

    .badge {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(8px);
      padding: 0.5rem 1.2rem;
      border-radius: 60px;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 1px;
      border: 1px solid rgba(145, 95, 255, 0.4);
      margin-bottom: 1.8rem;
      display: inline-block;
    }

    .hero h1 {
      font-size: 4rem;
      font-weight: 800;
      font-family: 'Orbitron', sans-serif;
      background: linear-gradient(to right, #fff, #b2a0ff, #6e8cff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      max-width: 900px;
      letter-spacing: -0.02em;
      margin-bottom: 0;  /* убираем отступ снизу, так как текст удален */
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    }

    /* БЛОК BLOODY NIGHT — кнопка скачивания внутри */
    .featured-game {
      margin: 2rem 0 3rem;
      display: flex;
      justify-content: center;
    }

    .bloody-card {
      background: rgba(8, 6, 18, 0.7);
      backdrop-filter: blur(18px);
      border-radius: 48px;
      padding: 2.2rem 2.8rem;
      border: 1px solid rgba(210, 70, 120, 0.6);
      box-shadow: 0 25px 45px -12px rgba(180, 20, 70, 0.4);
      text-align: center;
      transition: 0.3s;
      width: 100%;
      max-width: 720px;
      position: relative;
      overflow: hidden;
    }

    .bloody-card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(190, 30, 80, 0.2), transparent 70%);
      animation: slowRotate 22s infinite linear;
      z-index: -1;
    }

    @keyframes slowRotate {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .bloody-icon {
      font-size: 4rem;
      color: #ff5c8a;
      filter: drop-shadow(0 0 8px #ff3366);
      margin-bottom: 0.8rem;
    }

    .bloody-card h2 {
      font-family: 'Orbitron', monospace;
      font-size: 3.1rem;
      font-weight: 800;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #ffb7c5, #ff3b6f, #b90e4a);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 0.5rem;
      text-shadow: 0 0 5px rgba(255, 50, 90, 0.5);
    }

    .bloody-tagline {
      font-size: 1rem;
      color: #ffbbcc;
      border-top: 1px dashed rgba(255, 80, 120, 0.6);
      display: inline-block;
      padding-top: 0.6rem;
      margin-top: 0.3rem;
      font-weight: 500;
    }

    .bloody-description {
      margin-top: 1.2rem;
      color: #e0cbdb;
      font-size: 1rem;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
      margin-bottom: 2rem;
    }

    /* Кнопка скачивания внутри карточки Bloody Night */
    .bloody-download-btn {
      background: linear-gradient(95deg, #d42c5a, #ff4777);
      border: none;
      padding: 0.9rem 2.2rem;
      border-radius: 60px;
      cursor: pointer;
      font-family: 'Orbitron', 'Inter', sans-serif;
      font-weight: 700;
      font-size: 1.25rem;
      letter-spacing: 1px;
      color: white;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 8px 20px rgba(200, 40, 90, 0.5);
      transition: all 0.3s ease;
      border: 1px solid rgba(255, 200, 210, 0.4);
      backdrop-filter: blur(2px);
      margin-top: 0.6rem;
    }

    .bloody-download-btn i {
      font-size: 1.3rem;
      transition: transform 0.2s;
    }

    .bloody-download-btn:hover {
      transform: scale(1.04);
      background: linear-gradient(95deg, #e63c6c, #ff6090);
      box-shadow: 0 12px 26px rgba(230, 60, 108, 0.7);
    }

    .bloody-download-btn:active {
      transform: scale(0.97);
    }

    /* Пустое место */
    .empty-space {
      margin: 0.5rem 0;
    }

    /* Футер */
    .footer {
      margin-top: 5rem;
      padding-top: 2rem;
      border-top: 1px solid rgba(255,255,255,0.08);
      text-align: center;
      color: #6a72a0;
      font-size: 0.85rem;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .social-links a {
      color: #8d96c0;
      margin: 0 10px;
      font-size: 1.2rem;
      transition: 0.2s;
    }

    .social-links a:hover {
      color: #b797ff;
    }

    @media (max-width: 760px) {
      .container {
        padding: 1.2rem;
      }
      .hero h1 {
        font-size: 2.5rem;
      }
      .navbar {
        flex-direction: column;
        gap: 1rem;
      }
      .menu-icons a {
        margin: 0 12px;
      }
      .bloody-card h2 {
        font-size: 2.2rem;
      }
      .bloody-card {
        padding: 1.6rem;
      }
      .bloody-download-btn {
        font-size: 1rem;
        padding: 0.7rem 1.6rem;
      }
    }

    /* тост-уведомление */
    .toast-message {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) scale(0.9);
      background: #1a1f2ee0;
      backdrop-filter: blur(12px);
      border-radius: 60px;
      padding: 0.8rem 2rem;
      font-weight: 500;
      color: white;
      border-left: 4px solid #ff4d7a;
      font-size: 0.9rem;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 1000;
      font-family: 'Inter', sans-serif;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    .toast-message.show {
      opacity: 1;
      transform: translateX(-50%) scale(1);
    }
  </style>
</head>
<body>
<div class="stars-bg"></div>
<div class="glow"></div>
<div class="glow glow2"></div>

<div class="container">
  <div class="navbar">
    <div class="logo">SIRIUS <span>GAMES</span></div>
    <div class="menu-icons">
      <a href="#" aria-label="Каталог"><i class="fas fa-gamepad"></i></a>
      <a href="#" aria-label="Магазин"><i class="fas fa-store"></i></a>
      <a href="#" aria-label="Сообщество"><i class="fas fa-users"></i></a>
    </div>
  </div>

  <div class="hero">
    <div class="badge">
      <i class="fas fa-star-of-life" style="margin-right: 8px;"></i> ЭКСКЛЮЗИВНАЯ НОВИНКА
    </div>
    <h1>SIRIUS GAMES</h1>
    <!-- Весь лишний текст удалён, оставлен только заголовок -->
  </div>

  <!-- Окошко Bloody Night с кнопкой скачивания -->
  <div class="featured-game">
    <div class="bloody-card">
      <div class="bloody-icon">
        <i class="fas fa-moon"></i><i class="fas fa-skull" style="margin-left: 8px;"></i>
      </div>
      <h2>BLOODY NIGHT</h2>
      <div class="bloody-tagline">
        <i class="fas fa-droplet"></i> Пробуждение тьмы <i class="fas fa-droplet"></i>
      </div>
      <div class="bloody-description">
        Психологический хоррор, где каждый твой шаг — на грани безумия. Кровавая луна освещает путь, но выход — только один.
      </div>
      <!-- Кнопка скачивания -->
      <button class="bloody-download-btn" id="downloadBloodyBtn">
        <i class="fas fa-download"></i> Скачать Bloody Night
      </button>
      <div style="margin-top: 1rem; font-size: 0.7rem; color: #b2899b;">
        <i class="fas fa-shield-alt"></i> Безопасный переход на официальный сайт
      </div>
    </div>
  </div>

  <div class="empty-space"></div>

  <div class="footer">
    <div>© 2025 SIRIUS GAMES — Вселенные без границ</div>
    <div class="social-links">
      <a href="#"><i class="fab fa-discord"></i></a>
      <a href="#"><i class="fab fa-twitter"></i></a>
      <a href="#"><i class="fab fa-steam"></i></a>
      <a href="#"><i class="fab fa-youtube"></i></a>
    </div>
  </div>
</div>

<div id="toastMsg" class="toast-message">
  <i class="fas fa-external-link-alt"></i> Перенаправление...
</div>

<script>
  (function() {
    // Кнопка внутри окошка Bloody Night
    const downloadBtn = document.getElementById('downloadBloodyBtn');
    const toast = document.getElementById('toastMsg');
    
    // ⚡ ИЗМЕНИТЕ ЭТУ ССЫЛКУ НА НУЖНЫЙ ВАМ ВНЕШНИЙ РЕСУРС (магазин, страница загрузки, файл и т.д.)
    const REDIRECT_URL = 'https://store.steampowered.com/';   // ← замените на нужный адрес
    
    function redirectToGamePage() {
      if (toast) {
        toast.classList.add('show');
        toast.innerHTML = '<i class="fas fa-skull"></i> Переход к загрузке Bloody Night...';
      }
      
      // лёгкая вибрация для эффекта (если поддерживается)
      if (navigator.vibrate) navigator.vibrate(50);
      
      // Небольшая задержка чтобы пользователь увидел уведомление
      setTimeout(() => {
        window.location.href = REDIRECT_URL;
      }, 400);
    }
    
    if (downloadBtn) {
      downloadBtn.addEventListener('click', redirectToGamePage);
    }
    
    // Анимация появления для заголовка
    const heroTitle = document.querySelector('.hero h1');
    if (heroTitle) {
      heroTitle.style.opacity = '0';
      heroTitle.style.transform = 'translateY(20px)';
      setTimeout(() => {
        heroTitle.style.transition = 'opacity 0.8s ease, transform 0.7s ease';
        heroTitle.style.opacity = '1';
        heroTitle.style.transform = 'translateY(0)';
      }, 100);
    }
    
    // Лёгкая пульсация карточки Bloody Night для акцента
    const bloodyCard = document.querySelector('.bloody-card');
    if (bloodyCard) {
      let pulseInterval = setInterval(() => {
        bloodyCard.style.transform = 'scale(1.005)';
        setTimeout(() => { bloodyCard.style.transform = 'scale(1)'; }, 280);
      }, 4200);
      // Очистка интервала при уходе со страницы
      window.addEventListener('beforeunload', () => clearInterval(pulseInterval));
    }
    
    console.log('%c✨ SIRIUS GAMES | BLOODY NIGHT EDITION ✨', 'color: #ff5c8a; font-size: 14px; font-weight: bold;');
    console.log('%cКнопка скачивания находится в карточке Bloody Night и ведёт на внешний сайт. Укажите свой URL в переменной REDIRECT_URL', 'color: #b0c4ff;');
  })();
</script>
</body>
</html>
